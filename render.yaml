services:
  - type: web
    name: swarmguard-status
    runtime: python
    rootDir: swarmguard-agents
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn status_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: STATUS_SERVER_URL
        value: https://swarmguard-status.onrender.com
